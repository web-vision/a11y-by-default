                              - generic: Santiago de Compostela
                            - generic [ref=f5e620]: Arriving in Santiago de Compostela is a moment many pilgrims never forget. The main square fills with walkers from all over the world, coming together to celebrate, reflect, and attend the Pilgrim's Mass at the magnificent cathedral. Here you receive your Compostela Certificate, the official recognition of your journey. But for many, reaching Santiago is not an ending — it is the beginning of something that continues long after the walk is over.
