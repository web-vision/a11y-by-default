                              - generic: What to Expect on the Camino
                            - generic [ref=f5e518]: Daily walks typically range from 15 to 30 km, with well-waymarked paths guided by yellow arrows and scallop shells. Accommodation options are plentiful, from affordable albergues to guesthouses and hotels, and the food along the way is simple, hearty, and full of regional character. More than anything, the Camino invites you into a slower, more mindful pace of life. No special training is required — just preparation, curiosity, and an open heart.
