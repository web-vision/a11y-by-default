<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <div class="callout callout-notice mb-3">
        <div class="callout-body">
            <p><f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.auditDisclaimer" /></p>
        </div>
    </div>

    <h1><f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang_mod.xlf:mlang_labels_tablabel" /></h1>

    <f:if condition="{pageUid} == 0">
        <f:then>
            <f:render partial="A11y/NoPage" />
        </f:then>
        <f:else>
            <div id="a11y-app"
                 data-page-uid="{pageUid}"
                 data-preview-uri="{previewUri}"
                 data-content-metadata="{contentMetadataJson}"
                 data-content-facts="{contentFactsJson}"
                 data-axe-js-url="{f:uri.resource(path: 'JavaScript/Vendor/axe.min.js', extensionName: 'a11y_by_default')}"
                 data-htmlcs-js-url="{f:uri.resource(path: 'JavaScript/Vendor/HTMLCS.min.js', extensionName: 'a11y_by_default')}">

                <div class="callout callout-info mb-3">
                    <div class="callout-body">
                        <p><f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.engine.axeInfo" /></p>
                        <p><f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.engine.htmlcsInfo" /></p>
                    </div>
                </div>

                <div class="d-flex align-items-center gap-2 mb-4"
                     role="group"
                     aria-label="{f:translate(key: 'LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.engineLabel')}">
                    <label for="a11y-engine-select" class="form-label mb-0 text-nowrap">
                        <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.engineLabel" />
                    </label>
                    <select id="a11y-engine-select"
                            class="form-select form-select-sm"
                            style="width: auto;">
                        <option value="axe">
                            <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.engine.axe" />
                        </option>
                        <option value="htmlcs">
                            <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.engine.htmlcs" />
                        </option>
                    </select>
                    <button type="button"
                            id="a11y-scan-button"
                            class="btn btn-primary btn-sm">
                        <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.scanButton" />
                    </button>
                </div>

                <f:if condition="{hasDeveloperCornerAccess}">
                    <ul class="nav nav-tabs mb-3"
                        role="tablist"
                        aria-label="{f:translate(key: 'LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.filters.viewLabel')}">
                        <li class="nav-item" role="presentation">
                            <button type="button"
                                    class="nav-link active"
                                    id="a11y-view-tab-editor"
                                    role="tab"
                                    aria-selected="true"
                                    aria-controls="a11y-results"
                                    tabindex="0"
                                    data-view="editor">
                                <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.filters.view.editor" />
                                <span class="badge text-bg-light ms-1" data-view-count="editor">0</span>
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button type="button"
                                    class="nav-link"
                                    id="a11y-view-tab-developer"
                                    role="tab"
                                    aria-selected="false"
                                    aria-controls="a11y-results"
                                    tabindex="-1"
                                    data-view="developer">
                                <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.filters.view.developer" />
                                <span class="badge text-bg-light ms-1" data-view-count="developer">0</span>
                            </button>
                        </li>
                    </ul>
                </f:if>

                <div class="d-flex align-items-center gap-2 mb-3 flex-wrap"
                     role="group"
                     aria-label="{f:translate(key: 'LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.filters.label')}">
                    <span class="fw-bold small text-nowrap">
                        <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.filters.severityLabel" />
                    </span>

                    <input class="btn-check a11y-filter-severity" type="checkbox" autocomplete="off"
                           id="a11y-filter-severity-critical" value="critical" checked="checked">
                    <label class="btn btn-sm btn-danger" for="a11y-filter-severity-critical" data-btn-class="btn-danger">
                        <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.filters.severity.critical" />
                        <span class="badge text-bg-light ms-1" data-severity-count="critical">0</span>
                    </label>

                    <input class="btn-check a11y-filter-severity" type="checkbox" autocomplete="off"
                           id="a11y-filter-severity-serious" value="serious" checked="checked">
                    <label class="btn btn-sm btn-warning" for="a11y-filter-severity-serious" data-btn-class="btn-warning">
                        <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.filters.severity.serious" />
                        <span class="badge text-bg-light ms-1" data-severity-count="serious">0</span>
                    </label>

                    <input class="btn-check a11y-filter-severity" type="checkbox" autocomplete="off"
                           id="a11y-filter-severity-moderate" value="moderate" checked="checked">
                    <label class="btn btn-sm btn-info" for="a11y-filter-severity-moderate" data-btn-class="btn-info">
                        <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.filters.severity.moderate" />
                        <span class="badge text-bg-light ms-1" data-severity-count="moderate">0</span>
                    </label>

                    <input class="btn-check a11y-filter-severity" type="checkbox" autocomplete="off"
                           id="a11y-filter-severity-minor" value="minor" checked="checked">
                    <label class="btn btn-sm btn-secondary" for="a11y-filter-severity-minor" data-btn-class="btn-secondary">
                        <f:translate key="LLL:EXT:a11y_by_default/Resources/Private/Language/locallang.xlf:module.filters.severity.minor" />
                        <span class="badge text-bg-light ms-1" data-severity-count="minor">0</span>
                    </label>
                </div>

                <div id="a11y-results"
                     role="tabpanel"
                     aria-live="polite"
                     <f:if condition="{hasDeveloperCornerAccess}">aria-labelledby="a11y-view-tab-editor"</f:if>>
                </div>
            </div>
        </f:else>
    </f:if>
</f:section>

</html>
